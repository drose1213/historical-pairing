services:
  mysql:
    image: mysql:8.4
    container_name: historical_pairing_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-historical_pairing}
      MYSQL_USER: ${MYSQL_USER:-history_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-history_user}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build: .
    container_name: historical_pairing_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: historical_pairing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./dist/client:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
