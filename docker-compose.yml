services:
  mysql:
    image: mysql:8.4
    container_name: historical_pairing_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: historical_pairing
      MYSQL_USER: history_user
      MYSQL_PASSWORD: history_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uhistory_user", "-phistory_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
